# Race Round 1 — Multi-model Parallel Racing Relay
# Step 1 concurrently dispatches to Gemini API, ChatGPT Web, and Kimi Web.
# Whichever model outputs text first wins and takes the relay!
name: "QA Refinement Race Round 1"
steps:
  - key: generate
    providers:
      - gemini_api_1
      - jdcloud_deepseek_v3_2
      - aliyun_qwen3_7_plus
      - chatgpt_web_1
      - kimi_web_1
    prompt: generate
  - key: review
    providers:
      - gemini_api_1
      - jdcloud_deepseek_v3_2
      - aliyun_qwen3_7_plus
    prompt: review
  - key: deep_analyze
    providers:
      - gemini_api_1
      - jdcloud_deepseek_v3_2
      - claude_web_1
    prompt: deep_analyze
  - key: improve
    providers:
      - gemini_api_1
      - jdcloud_deepseek_v3_2
      - chatgpt_web_1
    prompt: improve
  - key: summary
    providers:
      - gemini_api_1
      - jdcloud_deepseek_v3_2
      - aliyun_qwen3_7_plus
    prompt: summary
